<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
    <div class="container">
        <h1>Smart City Weather</h1>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
            <button id="searchBtn">Search</button>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>
        <div id="error-message" class="hidden"></div>
        
        <div id="weather-info" class="hidden">
            <h2 id="cityName"></h2>
            <p id="temperature"></p>
            <p id="condition"></p>
            <div id="suggestion-box">
                <h3>Suggestion:</h3>
                <p id="wearSuggestion"></p>
                <p id="umbrellaSuggestion"></p>
            </div>
        </div>
    </div>


    <div class="container history-container">
        <h2>Saved Cities</h2>
        <div class="history-controls">
            <input type="text" id="historySearch" placeholder="Search saved cities...">
            
            <select id="historyFilter">
                <option value="all">All Conditions</option>
                <option value="cold">Cold (&lt;10&deg;C)</option>
                <option value="moderate">Moderate (10-30&deg;C)</option>
                <option value="hot">Hot (&gt;30&deg;C)</option>
            </select>

            <select id="historySort">
                <option value="default">Sort By</option>
                <option value="temp-asc">Temp (Low to High)</option>
                <option value="temp-desc">Temp (High to Low)</option>
                <option value="name-asc">Name (A-Z)</option>
            </select>
        </div>
        
        <div id="historyList" class="history-list">

        </div>
        <p id="avgTempDisplay" class="avg-temp"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
