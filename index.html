<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Smart City Weather</h1>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
            <button id="searchBtn">Search</button>
        </div>

        <div id="loading" class="hidden">Fetching weather data...</div>
        <div id="error-message" class="hidden"></div>
        
        <div id="weather-info" class="hidden">
            <h2 id="cityName"></h2>
            <p id="temperature"></p>
            <p id="condition"></p>
            <div id="suggestion-box">
                <h3>Suggestion:</h3>
                <p id="wearSuggestion"></p>
                <p id="umbrellaSuggestion"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
